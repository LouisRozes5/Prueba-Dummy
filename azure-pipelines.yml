# Vue.js CI Pipeline
# Build, test and analyze code quality with SonarQube

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: '20.x'
  workingDir: 'vuejs'
  sonarProjectKey: 'Prueba-Dummy'
  sonarHostUrl: 'http://localhost:9000'

pool:
  name: Default

stages:
- stage: Build
  displayName: 'Build'
  jobs:
  - job: BuildJob
    displayName: 'Build Vue Application'
    timeoutInMinutes: 15
    steps:
    - checkout: self
      displayName: 'Checkout source code'

    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm install
      displayName: 'Install dependencies'
      workingDirectory: $(workingDir)

    - script: npm run build
      displayName: 'Build application'
      workingDirectory: $(workingDir)

    - task: PublishBuildArtifacts@1
      displayName: 'Publish build artifacts'
      inputs:
        PathtoPublish: '$(workingDir)/dist'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: CodeAnalysis
  displayName: 'Code Analysis'
  dependsOn: Build
  condition: succeeded('Build')
  jobs:
  - job: SonarQubeJob
    displayName: 'SonarQube Static Analysis'
    timeoutInMinutes: 20
    steps:
    - checkout: self
      displayName: 'Checkout source code'

    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm install
      displayName: 'Install dependencies'
      workingDirectory: $(workingDir)

    - powershell: |
        $props = @"
sonar.projectKey=$(sonarProjectKey)
sonar.projectName=$(sonarProjectKey)
sonar.sources=src
sonar.host.url=$(sonarHostUrl)
sonar.token=$env:SONAR_TOKEN
"@
        Set-Content -Path sonar-project.properties -Value $props -Encoding UTF8
        npx sonar-scanner
      displayName: 'Run SonarQube Analysis'
      workingDirectory: $(workingDir)
      env:
        SONAR_TOKEN: $(SONAR_TOKEN)
