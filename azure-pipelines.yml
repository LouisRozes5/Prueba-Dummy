# Vue.js CI Pipeline
# Build, test and analyze code quality with SonarQube

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: '20.x'
  workingDir: 'vuejs'
  sonarProjectKey: 'Prueba-Dummy'
  sonarHostUrl: 'http://localhost:9000'
  imageRepository: 'prueba-dummy'
  tag: '$(Build.BuildId)'
  acrName: 'pruebadummyacr'
  acrLoginServer: 'pruebadummyacr.azurecr.io'
  aksResourceGroup: 'prueba-dummy-rg'
  aksClusterName: 'prueba-dummy-aks'

pool:
  name: Default

stages:
- stage: Build
  displayName: 'Build'
  jobs:
  - job: BuildJob
    displayName: 'Build Vue Application'
    timeoutInMinutes: 15
    steps:
    - checkout: self
      displayName: 'Checkout source code'

    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm install
      displayName: 'Install dependencies'
      workingDirectory: $(workingDir)

    - script: npm run build
      displayName: 'Build application'
      workingDirectory: $(workingDir)

    - task: PublishBuildArtifacts@1
      displayName: 'Publish build artifacts'
      inputs:
        PathtoPublish: '$(workingDir)/dist'
        ArtifactName: 'drop'
        publishLocation: 'Container'

- stage: CodeAnalysis
  displayName: 'Code Analysis'
  dependsOn: Build
  condition: succeeded('Build')
  jobs:
  - job: SonarQubeJob
    displayName: 'SonarQube Static Analysis'
    timeoutInMinutes: 20
    steps:
    - checkout: self
      displayName: 'Checkout source code'

    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm install
      displayName: 'Install dependencies'
      workingDirectory: $(workingDir)

    - powershell: |
        Remove-Item -Path sonar-project.properties -ErrorAction SilentlyContinue
        Add-Content -Path sonar-project.properties -Value "sonar.projectKey=$(sonarProjectKey)"
        Add-Content -Path sonar-project.properties -Value "sonar.projectName=$(sonarProjectKey)"
        Add-Content -Path sonar-project.properties -Value "sonar.sources=src"
        Add-Content -Path sonar-project.properties -Value "sonar.host.url=$(sonarHostUrl)"
        Add-Content -Path sonar-project.properties -Value "sonar.token=$env:SONAR_TOKEN"
        npx sonar-scanner
      displayName: 'Run SonarQube Analysis'
      workingDirectory: $(workingDir)
      env:
        SONAR_TOKEN: $(SONAR_TOKEN)

- stage: DockerBuild
  displayName: 'Docker Build & Push to ACR'
  dependsOn: CodeAnalysis
  condition: succeeded('CodeAnalysis')
  jobs:
  - job: DockerJob
    displayName: 'Build and Push to Azure Container Registry'
    timeoutInMinutes: 20
    steps:
    - checkout: self
      displayName: 'Checkout source code'

    - task: AzureCLI@2
      displayName: 'Build and Push image to ACR'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr login --name $(acrName)
          docker build -t $(acrLoginServer)/$(imageRepository):$(tag) -t $(acrLoginServer)/$(imageRepository):latest $(workingDir)/
          docker push $(acrLoginServer)/$(imageRepository):$(tag)
          docker push $(acrLoginServer)/$(imageRepository):latest

- stage: Deploy
  displayName: 'Deploy to AKS'
  dependsOn: DockerBuild
  condition: succeeded('DockerBuild')
  jobs:
  - job: DeployJob
    displayName: 'Deploy to AKS with Kustomize'
    timeoutInMinutes: 30
    steps:
    - checkout: self
      displayName: 'Checkout source code'

    - task: AzureCLI@2
      displayName: 'Install NGINX Ingress Controller'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksClusterName) --overwrite-existing
          $ns = kubectl get ns ingress-nginx --ignore-not-found
          if (-not $ns) {
            kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.1/deploy/static/provider/cloud/deploy.yaml
            kubectl wait --namespace ingress-nginx --for=condition=ready pod --selector=app.kubernetes.io/component=controller --timeout=180s
          }

    - task: AzureCLI@2
      displayName: 'Deploy app with Kustomize'
      inputs:
        azureSubscription: 'azure-connection'
        scriptType: 'ps'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az aks get-credentials --resource-group $(aksResourceGroup) --name $(aksClusterName) --overwrite-existing
          (Get-Content environment/k8s/overlays/production/kustomization.yaml) -replace 'pruebadummyacr.azurecr.io', '$(acrLoginServer)' -replace "newTag: latest", "newTag: '$(tag)'" | Set-Content environment/k8s/overlays/production/kustomization.yaml
          kubectl apply -k environment/k8s/overlays/production/
          kubectl rollout status deployment/prueba-dummy --timeout=120s
          $ip = kubectl get ingress prueba-dummy -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
          Write-Host "##vso[task.setvariable variable=APP_URL]http://$ip"
          Write-Host "App disponible en: http://$ip"
