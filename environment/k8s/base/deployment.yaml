apiVersion: apps/v1
kind: Deployment
metadata:
  name: prueba-dummy
  labels:
    app: prueba-dummy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prueba-dummy
  template:
    metadata:
      labels:
        app: prueba-dummy
    spec:
      containers:
        - name: prueba-dummy
          image: prueba-dummy:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
